version: "3.9"

services:
  # ─── Databases ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: veritas
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: veritas
      MINIO_ROOT_PASSWORD: veritas_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── API ─────────────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://veritas:veritas_dev@postgres:5432/veritas
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: veritas
      MINIO_SECRET_KEY: veritas_dev_secret
      MINIO_BUCKET: veritas-docs
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Workers ─────────────────────────────────────────────────
  crawler:
    build:
      context: ../../workers/crawler
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://veritas:veritas_dev@postgres:5432/veritas
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: veritas
      MINIO_SECRET_KEY: veritas_dev_secret
      MINIO_BUCKET: veritas-docs
      CELERY_BROKER: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: celery -A tasks worker -Q crawl -c 4 --loglevel=info

  extractor:
    build:
      context: ../../workers/extractor
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://veritas:veritas_dev@postgres:5432/veritas
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: veritas
      MINIO_SECRET_KEY: veritas_dev_secret
      MINIO_BUCKET: veritas-docs
      CELERY_BROKER: redis://redis:6379/1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A tasks worker -Q extract -c 2 --loglevel=info

  linker:
    build:
      context: ../../workers/linker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://veritas:veritas_dev@postgres:5432/veritas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A tasks worker -Q link -c 2 --loglevel=info

  risk-engine:
    build:
      context: ../../workers/risk-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://veritas:veritas_dev@postgres:5432/veritas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A tasks worker -Q risk -c 2 --loglevel=info

  celery-beat:
    build:
      context: ../../workers/crawler
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://veritas:veritas_dev@postgres:5432/veritas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER: redis://redis:6379/1
    depends_on:
      - redis
    command: celery -A tasks beat --loglevel=info --scheduler=redbeat.RedBeatScheduler

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis

  # ─── Frontend ─────────────────────────────────────────────────
  web-public:
    build:
      context: ../../apps/web-public
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  web-analyst:
    build:
      context: ../../apps/web-analyst
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      PORT: 3001
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
