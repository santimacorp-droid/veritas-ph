<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Cyber Gradient -->
  <linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stopColor="#00B0FF" />
    <stop offset="100%" stopColor="#00E676" />
  </linearGradient>

  <!-- Risk Gradient -->
  <linearGradient id="risk" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stopColor="#FF4D5E" />
    <stop offset="100%" stopColor="#FF9838" />
  </linearGradient>

  <!-- Dark Background Plate -->
  <rect width="32" height="32" rx="6" fill="#08090C" />

  <!-- Left Chevron Ribbon -->
  <path
    d="M6 8L13.5 24.5C14.2 26 15.8 26 16.5 24.5L24 8"
    stroke="url(#cyber)"
    strokeWidth="3.5"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  <!-- Right Accent Ribbon -->
  <path
    d="M17.5 17L21 9"
    stroke="url(#risk)"
    strokeWidth="3"
    strokeLinecap="round"
  />

  <!-- Center Node -->
  <circle cx="16" cy="15" r="1.5" fill="#F3F5F9" />
</svg>
